services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      JWT_SECRET: dev-secret-change-in-production
      AUTH_SERVICE_URL: http://auth-service:4001
      PRODUCT_SERVICE_URL: http://product-service:4002
      ORDER_SERVICE_URL: http://order-service:4003
      NOTIFICATION_SERVICE_URL: http://notification-service:4004
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: development
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    ports:
      - "4001:4001"
    environment:
      PORT: 4001
      JWT_SECRET: dev-secret-change-in-production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: ecommerce_db
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  product-service:
    build:
      context: .
      dockerfile: services/product-service/Dockerfile
    ports:
      - "4002:4002"
    environment:
      PORT: 4002
      JWT_SECRET: dev-secret-change-in-production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PRODUCT_DB_HOST: postgres
      PRODUCT_DB_PORT: 5432
      PRODUCT_DB_USER: postgres
      PRODUCT_DB_PASSWORD: postgres
      PRODUCT_DB_DATABASE: ecommerce_db
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  order-service:
    build:
      context: .
      dockerfile: services/order-service/Dockerfile
    ports:
      - "4003:4003"
    environment:
      PORT: 4003
      JWT_SECRET: dev-secret-change-in-production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ORDER_DB_HOST: postgres
      ORDER_DB_PORT: 5432
      ORDER_DB_USER: postgres
      ORDER_DB_PASSWORD: postgres
      ORDER_DB_DATABASE: ecommerce_db
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    ports:
      - "4004:4004"
    environment:
      PORT: 4004
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: development
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  billing-service:
    build:
      context: .
      dockerfile: services/billing-service/Dockerfile
    ports:
      - "4005:4005"
    environment:
      PORT: 4005
      JWT_SECRET: dev-secret-change-in-production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      BILLING_DB_HOST: postgres
      BILLING_DB_PORT: 5432
      BILLING_DB_USER: postgres
      BILLING_DB_PASSWORD: postgres
      BILLING_DB_DATABASE: ecommerce_db
      BILLING_EMISOR_RFC: RFC123456XYZ
      BILLING_EMISOR_NOMBRE: Mi Empresa S.A. de C.V.
      BILLING_EMISOR_REGIMEN: 601
      BILLING_EMISOR_CP: 00000
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
